name: Weekly WIPO refusal fetch

on:
  schedule:
    # Fridays at 10:00 UTC (day after the Gazette publishes on Thursdays)
    - cron: "0 10 * * 5"
  # Lets you run it manually from the Actions tab
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back to fetch"
        required: false
        default: "7"

jobs:
  fetch-and-push:
    name: Fetch WIPO Gazette and push to Google Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch from WIPO and append to Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB: Refusals
          DAYS: ${{ github.event.inputs.days || '7' }}
        run: |
          python - <<'PY'
          import os, sys
          from parser import fetch_latest_refusals
          from sheets import push_to_sheet

          days = int(os.environ.get("DAYS", "7"))
          print(f"Fetching last {days} day(s) from WIPO...", flush=True)

          try:
              rows, source = fetch_latest_refusals(days=days)
          except Exception as exc:
              print(f"::error::Fetch failed: {exc}")
              sys.exit(1)

          print(f"Got {len(rows)} refusal rows from: {source}", flush=True)

          if not rows:
              print("::notice::No matching refusals this week — nothing to push.")
              sys.exit(0)

          sheet_id = os.environ.get("GOOGLE_SHEET_ID")
          if not sheet_id:
              print("::error::GOOGLE_SHEET_ID secret not set on GitHub.")
              sys.exit(1)

          try:
              appended = push_to_sheet(sheet_id, rows)
          except Exception as exc:
              print(f"::error::Sheet push failed: {exc}")
              sys.exit(1)

          print(f"::notice::Appended {appended} new rows to the Google Sheet ({len(rows) - appended} duplicates skipped).")
          PY
